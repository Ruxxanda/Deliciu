<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Coș</title>
    <style>
        .pret-vechi {
            color: #777;
            font-size: 14px;
            text-decoration: line-through;
            text-decoration-color: red;
        }

        .pret-redus {
            color: red;
            font-size: 22px;
            font-weight: bold;
        }

        .badge-reducere {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }
    </style>
    <script defer>
        async function afiseazaCos() {
            const uid = localStorage.getItem("uid");
            if (!uid) {
                document.getElementById("error").innerText = "Trebuie să fiți logat pentru a vedea coșul.";
                return;
            }
            const resCos = await fetch(`http://localhost:3000/cos/${uid}`);
            const cosItems = await resCos.json();
            const resProd = await fetch("http://localhost:3000/api/produse");
            const data = await resProd.json();
            const produse = data.products;
            const cosProd = cosItems.map(item => {
                const prod = produse.find(p => p.nume === item.nume);
                let totalQty = 0;
                if (!prod) {
                    // Produs personalizat, calculeaza totalQty
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(item.descriere, 'text/html');
                    const lis = doc.querySelectorAll('li');
                    lis.forEach(li => {
                        const text = li.textContent;
                        const parts = text.split(', ');
                        const qtyStr = parts[parts.length - 1];
                        const qty = parseInt(qtyStr) || 0;
                        totalQty += qty;
                    });
                }
                if (prod) {
                    return { ...prod, cantitate: item.cantitate };
                } else {
                    // Produs personalizat
                    return { nume: item.nume, imagine: 'pagini/pozeProduse/poza.jpg', descriere: 'Produs personalizat', pret: item.pret, cantitate: item.cantitate, fullDescriere: item.descriere, totalQty };
                }
            });
            const div = document.getElementById("cosDisplay");
            div.innerHTML = "";
            cosProd.forEach((p, index) => {
                const isCustom = !produse.find(prod => prod.nume === p.nume);
                const areReducere = p.reducere != null && p.reducere !== "" && p.pretRedus != null && p.pretRedus !== "";
                let pretHTML = "";
                if (!areReducere) {
                    pretHTML = `<span>${p.pret} Lei</span>`;
                } else {
                    pretHTML = `
<div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div class="pret-vechi">${p.pret} Lei</div>
        <div class="pret-redus">${p.pretRedus} Lei</div>
    </div>
    <div class="badge-reducere">-${p.reducere}% reducere</div>
</div>
`;
                }
                const card = document.createElement("div");
                let detailsHTML = '';
                if (isCustom) {
                    detailsHTML = `
                        <button onclick="toggleDetails(${index})" id="btn-${index}">Detalii ▶</button>
                        <div id="details-${index}" style="display: none; margin-top: 10px;">${p.fullDescriere}</div>
                    `;
                }
                card.innerHTML = `
            <img src="http://localhost:3000/${p.imagine}" alt="produs" width="200"><br>
            <h3>${p.nume}</h3>
            <p>${p.descriere.split('\n')[0] || p.descriere}</p>
            <p>${pretHTML}</p>
            <p>Cantitate: ${isCustom ? (p.totalQty / 1000) + ' kg' : p.cantitate}</p>
            ${detailsHTML}
            <i class="fa fa-shopping-cart" style="color: green; cursor: pointer;" onclick="toggleCos('${p.nume}', ${p.cantitate})"></i>`;
                div.appendChild(card);
            });
        }

        async function toggleDetails(index) {
            const detailsDiv = document.getElementById(`details-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            if (detailsDiv.style.display === 'none') {
                detailsDiv.style.display = 'block';
                btn.innerHTML = 'Detalii ▼';
            } else {
                detailsDiv.style.display = 'none';
                btn.innerHTML = 'Detalii ▶';
            }
        }

        async function toggleCos(nume, currentCantitate) {
            const uid = localStorage.getItem("uid");
            if (!uid) return;
            if (currentCantitate > 1) {
                await fetch("http://localhost:3000/updateCos", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ uid, nume, cantitate: -1 })
                });
            } else {
                await fetch(`http://localhost:3000/stergeCos/${uid}/${encodeURIComponent(nume)}`, { method: "DELETE" });
            }
            afiseazaCos();
        }

        async function placeOrder() {
            const uid = localStorage.getItem("uid");
            if (!uid) return;
            const userRes = await fetch(`http://localhost:3000/user/${uid}`);
            const user = await userRes.json();
            const cartRes = await fetch(`http://localhost:3000/cos/${uid}`);
            const cart = await cartRes.json();
            if (cart.length === 0) {
                console.error("Coșul este gol!");
                return;
            }
            await fetch("http://localhost:3000/placeOrder", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ uid, user, cart })
            });
            for (const item of cart) {
                await fetch(`http://localhost:3000/stergeCos/${uid}/${encodeURIComponent(item.nume)}`, { method: "DELETE" });
            }
            afiseazaCos();
            console.log("Comandă plasată!");
        }

        document.addEventListener("DOMContentLoaded", () => {
            afiseazaCos();
            document.getElementById("placeOrderBtn").onclick = placeOrder;
        });
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <h2>Coș</h2>
    <p id="error"></p>
    <div id="cosDisplay"></div>
    <button id="placeOrderBtn">Plasează o comandă</button>
</body>

</html>

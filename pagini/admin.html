<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Admin - Panou</title>
    <script src="../scripts/admin.js" defer></script>

    <style>
        body {
            font-family: Arial;
            width: 90%;
            max-width: 700px;
            margin: 20px auto
        }

        input,
        button,
        textarea {
            display: block;
            width: 100%;
            padding: 8px;
            margin: 6px 0
        }

        img.thumb {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin: 6px
        }

        .prod {
            border: 1px solid #ddd;
            padding: 8px;
            margin: 8px 0;
            display: flex;
            gap: 12px;
            align-items: center
        }

        .prod .info {
            flex: 1
        }
    </style>
</head>

<body>
    <h2>Panou Admin</h2>
    <div id="adminInfo"></div>
    <button id="logoutBtn">Deconectare</button>

    <h2>Toți userii</h2>
    <div id="users"></div>

    <h2>Toate comentariile</h2>
    <div id="coms"></div>

    <h2>Comenzi</h2>
    <div id="orders"></div>

    <h2>Comenzi efectuate</h2>
    <div id="completedOrders"></div>

    <a href="produse.html">Produse</a>

    <h2>Adaugă produs</h2>

    <form id="prodForm" enctype="multipart/form-data">
        <label>Denumirea produsului:</label><br>
        <input type="text" id="nume" required><br><br>

        <label>Imagine (opțional):</label><br>
        <input type="file" id="imagine" accept="image/*"><br><br>

        <label>Descriere:</label><br>
        <textarea id="descriere" required></textarea><br><br>

        <label>Preț (MDL/kg):</label><br>
        <input type="number" id="pret" required><br><br>

        <button type="submit">Adaugă</button>
    </form>

    

    <script src="../scripts/send.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <title>Produse</title>
    <style>
        body {
            background-color: rgb(192, 192, 255);
        }

        body {
            background-color: rgb(192, 192, 255);
        }

        .pret-vechi {
            color: #777;
            font-size: 14px;
            text-decoration: line-through;
            text-decoration-color: red;
        }

        .pret-redus {
            color: red;
            font-size: 22px;
            font-weight: bold;
        }

        .badge-reducere {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }
    </style>
    <script defer>
        let salvari = [];
        let cos = {};
        let produse = [];
        let reduceri = [];

        async function loadUserData() {
            const uid = localStorage.getItem("uid");
            if (!uid) return;
            const resSalv = await fetch(`http://localhost:3000/salvari/${uid}`);
            salvari = await resSalv.json();
            const resCos = await fetch(`http://localhost:3000/cos/${uid}`);
            const cosItems = await resCos.json();
            cos = {};
            cosItems.forEach(item => cos[item.nume] = item.cantitate);
        }

        async function afiseazaProduse() {
            await loadUserData();
            try {
                const resProd = await fetch("http://localhost:3000/api/produse");
                if (!resProd.ok) throw new Error(await resProd.text());
                const data = await resProd.json();
                produse = data.products;
            } catch (error) {
                console.error('Error loading products:', error);
                return;
            }
            const div = document.getElementById("produseDisplay");
            div.innerHTML = "";
            produse.forEach(p => {
                const isSaved = salvari.includes(p.nume);
                const isInCart = cos[p.nume] > 0;
                const heartColor = isSaved ? 'red' : 'white';
                const quantityId = `qty-${p.nume.replace(/\s/g, '-')}`;
                const initialQty = isInCart ? cos[p.nume] : 1;
                const buttonText = isInCart ? 'Salveaza' : 'Adauga in cos';
                let cartHTML = `
                    <div class="quantity-selector" style="display: flex; align-items: center; margin-top: 10px;">
                        <button onclick="changeQuantity('${p.nume}', -1)" style="width: 30px; height: 30px;">-</button>
                        <span id="${quantityId}" style="margin: 0 10px;">${initialQty}</span>
                        <button onclick="changeQuantity('${p.nume}', 1)" style="width: 30px; height: 30px;">+</button>
                    </div>
                    <button onclick="adaugaInCos('${p.nume}')" style="margin-top: 10px;">${buttonText}</button>
                `;

                const areReducere =
                    p.reducere != null &&
                    p.reducere !== "" &&
                    p.pretRedus != null &&
                    p.pretRedus !== "";

                let pretHTML = "";

                if (!areReducere) {
                    // afișare normală
                    pretHTML = `<span>${p.pret} Lei</span>`;
                } else {
                    // afișare cu reducere
                    pretHTML = `
<div>
    <div style="display: flex; align-items: center; gap: 10px;">
        <div class="pret-vechi">${p.pret} Lei</div>
        <div class="pret-redus">${p.pretRedus} Lei</div>
    </div>
    <div class="badge-reducere">-${p.reducere}% reducere</div>
</div>
`;
                }


                const card = document.createElement("div");
                card.innerHTML = `
                    <img src="http://localhost:3000/${p.imagine}" alt="produs" width="200"><br>
                    <h3>${p.nume}</h3>
                    <p>${p.descriere}</p>
                    <p>${pretHTML}</p>
                    <i class="fa fa-heart" style="color: ${heartColor}; cursor: pointer;" onclick="toggleSalvare('${p.nume}')"></i>
                    ${cartHTML}
                `;
                div.appendChild(card);
            });
        }

        function changeQuantity(nume, delta) {
            const qtyEl = document.getElementById(`qty-${nume.replace(/\s/g, '-')}`);
            let qty = parseInt(qtyEl.textContent);
            qty += delta;
            if (qty < 1) qty = 1;
            qtyEl.textContent = qty;
        }

        async function adaugaInCos(nume) {
            const uid = localStorage.getItem("uid");
            if (!uid) {
                document.getElementById("error").innerText = "Trebuie să fiți logat pentru a adăuga în coș.";
                return;
            }
            const qtyEl = document.getElementById(`qty-${nume.replace(/\s/g, '-')}`);
            const cantitate = parseInt(qtyEl.textContent);
            const product = produse.find(p => p.nume === nume);
            const pret = product ? (product.pretRedus || product.pret) : 0;
            const descriere = product ? product.descriere : '';
            await fetch("http://localhost:3000/adaugaCos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ uid, nume, cantitate, pret, descriere })
            });
            cos[nume] = cantitate;
            afiseazaProduse();
        }

        async function toggleSalvare(nume) {
            const uid = localStorage.getItem("uid");
            if (!uid) {
                document.getElementById("error").innerText = "Trebuie să fiți logat pentru a salva produse.";
                return;
            }
            const isSaved = salvari.includes(nume);
            if (isSaved) {
                await fetch(`http://localhost:3000/stergeSalvare/${uid}/${encodeURIComponent(nume)}`, { method: "DELETE" });
                salvari = salvari.filter(id => id !== nume);
            } else {
                await fetch("http://localhost:3000/adaugaSalvare", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ uid, nume })
                });
                salvari.push(nume);
            }
            afiseazaProduse();
        }

        document.addEventListener("DOMContentLoaded", afiseazaProduse);
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <h2>Produse</h2>
    <a href="cos.html">cos</a>
    <a href="salvari.html">salvari</a>
    <p id="error"></p>
    <div id="produseDisplay"></div>
</body>

</html>
